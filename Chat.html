<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google UI Clone</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#fff;
        }

        .container{
            text-align:center;
        }

        .logo{
            font-size:80px;
            font-weight:bold;
            margin-bottom:30px;
        }

        .blue{color:#4285F4;}
        .red{color:#EA4335;}
        .yellow{color:#FBBC05;}
        .green{color:#34A853;}

        .search-box{
            width:600px;
            max-width:90%;
            padding:14px 20px;
            border:1px solid #dcdcdc;
            border-radius:30px;
            font-size:16px;
            outline:none;
            transition:.3s;
        }

        .search-box:hover,
        .search-box:focus{
            box-shadow:0 2px 8px rgba(0,0,0,.2);
        }

        .buttons{
            margin-top:30px;
        }

        button{
            padding:10px 20px;
            margin:0 8px;
            border:none;
            border-radius:4px;
            background:#f8f9fa;
            cursor:pointer;
            font-size:14px;
        }

        button:hover{
            border:1px solid #dadce0;
            box-shadow:0 1px 2px rgba(0,0,0,.1);
        }

        .footer{
            margin-top:30px;
            color:#555;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="logo">
        <span class="blue">G</span>
        <span class="red">o</span>
        <span class="yellow">o</span>
        <span class="blue">g</span>
        <span class="green">l</span>
        <span class="red">e</span>
    </div>

    <input
        type="text"
        class="search-box"
        placeholder="Search Google or type a URL"
    >

    <div class="buttons">
        <button>Google Search</button>
        <button>I'm Feeling Lucky</button>
    </div>

    <div class="footer">
        This is a simple HTML/CSS demo inspired by Google's homepage.
    </div>

</div>

</body>
</html>
